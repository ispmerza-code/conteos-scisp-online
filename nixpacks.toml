# Configuración de Nixpacks para Railway
# Deja que Nixpacks detecte Python automáticamente desde runtime.txt

[phases.install]
cmds = ["python -m pip install --upgrade pip", "python -m pip install -r requirements.txt"]

[start]
cmd = "gunicorn -w 2 -k uvicorn.workers.UvicornWorker main:app --bind=0.0.0.0:$PORT --timeout 120 --keep-alive 5"
