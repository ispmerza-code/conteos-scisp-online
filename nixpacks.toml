# Configuración de Nixpacks para Railway
# Fija la versión de Python que Railway debe usar al construir la imagen

[phases.setup]
nixPkgs = ["python313", "gcc"]

[phases.install]
cmds = ["pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
cmd = "gunicorn -w 2 -k uvicorn.workers.UvicornWorker main:app --bind=0.0.0.0:$PORT --timeout 120 --keep-alive 5"
